<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Tree Notes</title>
</head>
<body>

    <!-- Floating App Menu -->
    <div id="appMenu">
        <img src="TreenotesICON.png" alt="Menu" id="menuIcon">
        <div id="menuPopup">
            <p><strong>📘 TreeNotes Menu</strong></p>
            <button id="toggleDarkMode">🌓 Toggle Dark Mode</button>
            <button id="help">❓ Help</button>
            <button id="about">ℹ️ About</button>
            <div>
                <label for="ollama-model">Ollama Model:</label>
                <input type="text" id="ollama-model" value="llama3">
            </div>
            <div>
                <input type="checkbox" id="framework-of-trust">
                <label for="framework-of-trust">Framework of Trust</label>
            </div>
            <div class="menu-api-row">
                <label for="api-base-url">API URL</label>
                <input type="url" id="api-base-url" size="26" placeholder="http://127.0.0.1:8000" autocomplete="off">
            </div>
        </div>
    </div>

    <div id="title-bar">
        <h1>Tree Notes</h1>
        <button id="fullscreen-btn">⛶</button>
    </div>
    <main id="cornellLayout">
        <div id="heading" class="cornell-heading">
            <div id="headingText" contenteditable="true" data-placeholder="Cornell Note Heading"></div>
        </div>

        <div class="cornell-body">
            <section id="text" class="cornell-column cornell-column--cue">
                <header class="column-title">Cue Column</header>
                <div class="container" id="cueText" contenteditable="true" data-placeholder="Cue column data, key words, key questions"></div>
            </section>

            <div id="cornell-resizer"></div>

            <section id="tree" class="cornell-column cornell-column--notes">
                <div class="container">
                    <div id="toolbarBar" class="notes-toolbar">
                        <button class="button" onclick="createNewBlock()" title="Add box">➕</button>
                        <button class="button" onclick="zoom(1.1)" title="Zoom in">🔍</button>
                        <button class="button" onclick="zoom(0.9)" title="Zoom out">🔎</button>
                        <button class="button" id="gridToggle" aria-pressed="false" title="Toggle guide grid">#️⃣</button>
                        <button class="button" id="dictateToggle" aria-pressed="false" title="Toggle dictation">🎙️</button>
                        <button class="button" id="analyzeNotesBtn" title="Analyze notes with local LLM">🤖</button>
                        <button class="button" onclick="download()" title="Download notes">💾</button>
                        <button class="button" onclick="upload()" title="Upload notes">⬆️</button>
                        <button type="button" class="button" id="apiSaveBtn" title="Save to server (API)">☁️</button>
                        <button type="button" class="button" id="apiOpenBtn" title="Open from server">📂</button>
                        <button type="button" class="button" id="apiNewBtn" title="New local note">📄</button>
                        <span id="apiNoteIndicator" class="api-note-indicator" title="Current server note id" hidden></span>
                        <button class="button" onclick="noteInfo()" title="Note info">📝</button>
                    </div>

                    <div id="statusMessage" class="status-message" aria-live="polite"></div>

                    <div id="analysisPanel" class="analysis-panel" hidden>
                        <div class="analysis-panel__header">
                            <span>LLM Insights</span>
                            <button type="button" id="closeAnalysis" class="analysis-panel__close" aria-label="Hide AI insights">✕</button>
                        </div>
                        <div id="analysisContent" class="analysis-panel__content"></div>
                    </div>

                    <div id="treeQuickMenu" class="tree-menu" role="menu" aria-hidden="true">
                        <img src="logo/TreenotesICON.png" alt="Tree Notes menu icon" class="tree-menu__icon">
                        <button type="button" class="tree-menu__item" data-action="info">Info</button>
                        <button type="button" class="tree-menu__item" data-action="help">Help</button>
                        <button type="button" class="tree-menu__item" data-action="dark">Toggle Dark Mode</button>
                    </div>

                    <div id="zoom" class="zoom">
                        <div id="boxes">
                            <div id="1" class="box" contenteditable="true" style="background-color: #f1f1f1;">Seed</div>
                        </div>
                        <svg id="lines" width="3000px" height="3000px"></svg>
                    </div>
                </div>
            </section>
        </div>

        <div id="notes" class="cornell-summary">
            <header class="column-title column-title--summary">Summary</header>
            <div id="notesText" contenteditable="true" data-placeholder="Type your summary here..."></div>
        </div>
    </main>

    <div id="toolbar" class="toolbar">
        <input id="boxColor" type="color" aria-label="Box Color">
        <button id="addBox">Add Box+</button>
        <button id="deleteBox">Delete Box🗑️</button>
        <div id="link" class="dropdown">
            <button class="dropdown-button">Link 🖇️</button>
            <div class="dropdown-content"></div>
        </div>
    </div>


    <dialog id="apiOpenDialog" class="api-open-dialog">
        <div class="api-open-dialog__inner">
            <header class="api-open-dialog__header">Open from server</header>
            <p id="apiOpenError" class="api-open-dialog__error" hidden></p>
            <ul id="apiOpenList" class="api-open-list"></ul>
            <div class="api-open-dialog__actions">
                <button type="button" id="apiOpenRefresh">Refresh</button>
                <button type="button" id="apiOpenCancel">Close</button>
            </div>
        </div>
    </dialog>

    <div id="textToolbar" class="toolbar">
        <input id="t_boxColor" type="color" value="#eeeeee" aria-label="Highlight Color">
        <select id="t_dropdown"></select>
        <button id="t_remove">-</button>
    </div>
</body>
</html>
